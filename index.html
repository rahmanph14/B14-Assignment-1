<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevConf 2026</title>
    <link rel="stylesheet" href="./style.css" />

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Arimo:ital,wght@0,400..700;1,400..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="container">
      <!-- logo here -->
      <div class="logo">
        <a href="#"><img src="./images/logo.png" alt="logo" /></a>
      </div>
      <!-- navigation -->
      <nav>
        <ul>
          <li><a href="#">Speakers</a></li>
          <li><a href="#">Schedule</a></li>
          <li><a href="#">Tracks</a></li>
          <li><a href="#">Venue</a></li>
          <li><a href="#">Blog</a></li>
        </ul>
      </nav>
      <!-- Button -->
      <button class="common-btn">Register Now</button>
    </header>
    <section id="banner">
      <div class="banner-overlay"></div>
      <div class="banner-content">
        <div class="banner-content-description">
          <h1>Code. <em>Connect.</em> Create</h1>
          <p>
            Join 4,000+ engineers, founders, and builders at the premier
            developer conference of 2026. Three days of cutting-edge talks,
            hands-on workshops, and meaningful connections.
          </p>
        </div>
        <div class="banner-content-button">
          <button class="common-btn">Register Now</button>
        </div>
      </div>
    </section>
    <footer></footer>
  </body>
</html>
